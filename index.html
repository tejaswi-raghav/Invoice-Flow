<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InvoiceFlow — PINT-AE Invoice Workspace</title>
<style>
  :root{
    /* dark application chrome */
    --c-bg:#0c0f16; --c-panel:#111621; --c-panel-2:#161c29; --c-panel-3:#1c2433;
    --c-border:#222b3b; --c-border-2:#2c3850;
    --c-text:#e8ebf2; --c-muted:#9aa6ba; --c-faint:#69768c;
    /* light document canvas */
    --bg:#eceff4; --panel:#ffffff; --ink:#0f172a; --ink-2:#1e293b;
    --muted:#64748b; --faint:#94a3b8; --line:#e4e8f0; --line-soft:#eef1f6; --chip:#f1f4f9;
    /* AI accent */
    --ai:#7c6cff; --ai-2:#9b7bff; --ai-3:#5b8bff;
    --ai-grad:linear-gradient(135deg,#7c6cff 0%,#9b7bff 55%,#5b8bff 100%);
    --ai-soft:#efecff; --ai-line:#d8d2ff;
    /* semantic */
    --pass:#16a34a; --pass-d:#34d399; --pass-soft:#e9f7ef;
    --fail:#dc2626; --fail-d:#f87171; --fail-soft:#fbeceb;
    --warn:#d97706; --warn-d:#fbbf24; --warn-soft:#fdf3e3;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r:11px; --r-sm:8px; --r-lg:16px;
    --sh:0 1px 2px rgba(8,11,18,.06),0 8px 24px rgba(8,11,18,.06);
    --sh-lg:0 8px 30px rgba(8,11,18,.12),0 2px 8px rgba(8,11,18,.08);
    --sh-dark:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--c-bg);color:var(--c-text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--mono)}
  ::selection{background:rgba(124,108,255,.28)}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2b3547;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  .canvas ::-webkit-scrollbar-thumb{background:#cbd3e0;border:2px solid transparent;background-clip:content-box}

  /* ---------- top bar ---------- */
  .topbar{height:54px;display:flex;align-items:center;gap:14px;padding:0 16px;background:var(--c-panel);border-bottom:1px solid var(--c-border);position:sticky;top:0;z-index:40}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:30px;height:30px;border-radius:9px;background:var(--ai-grad);display:grid;place-items:center;flex:0 0 auto;box-shadow:0 4px 14px rgba(124,108,255,.4)}
  .brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.2px;color:#fff}
  .brand .sub{font-size:10.5px;color:var(--c-faint);margin-top:1px;letter-spacing:.3px}
  .topbar .spacer{flex:1}
  .pill{font-family:var(--mono);font-size:11px;color:var(--c-muted);background:var(--c-panel-2);border:1px solid var(--c-border);padding:4px 10px;border-radius:7px;white-space:nowrap}
  .pill b{color:#cbd2e2;font-weight:600}
  .icon-btn{display:none;border:1px solid var(--c-border);background:var(--c-panel-2);border-radius:8px;width:34px;height:34px;color:var(--c-text);align-items:center;justify-content:center}
  .icon-btn svg{width:17px;height:17px}

  /* ---------- layout ---------- */
  .app{display:grid;grid-template-columns:266px 1fr 376px;height:calc(100vh - 54px)}
  .col{height:100%;overflow:hidden;display:flex;flex-direction:column;min-width:0}
  .col.sources{background:var(--c-panel);border-right:1px solid var(--c-border)}
  .col.canvas{background:var(--bg)}
  .col.agent{background:var(--c-panel);border-left:1px solid var(--c-border)}
  .col-head{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex:0 0 auto;border-bottom:1px solid var(--c-border)}
  .col-head .ttl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--c-faint)}
  .col-body{overflow:auto;padding:14px;flex:1 1 auto}

  /* ---------- sources (dark) ---------- */
  .add-btn{border:1px solid var(--ai-line);background:rgba(124,108,255,.12);border-radius:8px;font-size:12px;padding:6px 11px;color:#c3b9ff;font-weight:600;display:flex;align-items:center;gap:6px}
  .add-btn:hover{background:rgba(124,108,255,.2)}
  .add-btn svg{width:13px;height:13px}
  .dropzone{border:1.4px dashed #313c52;border-radius:var(--r);padding:18px 14px;text-align:center;color:var(--c-muted);font-size:12.5px;background:var(--c-panel-2);transition:.15s}
  .dropzone.drag{border-color:var(--ai);background:rgba(124,108,255,.1);color:#c3b9ff}
  .dropzone b{color:var(--c-text);font-weight:600}
  .dz-actions{display:flex;gap:13px;margin-top:12px;justify-content:center;flex-wrap:wrap}
  .ghost{font-size:11.5px;color:var(--ai-2);background:none;border:none;padding:2px;font-weight:600}
  .ghost:hover{color:#c3b9ff;text-decoration:underline}
  .src-list{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .src{border:1px solid var(--c-border);border-radius:var(--r-sm);padding:11px 12px;background:var(--c-panel-2);cursor:pointer;transition:.13s;position:relative}
  .src:hover{border-color:var(--c-border-2);background:var(--c-panel-3)}
  .src.active{border-color:var(--ai);box-shadow:0 0 0 1px var(--ai),0 6px 18px rgba(124,108,255,.18);background:var(--c-panel-3)}
  .src .nm{font-size:13px;font-weight:600;color:var(--c-text);display:flex;align-items:center;gap:7px;word-break:break-all;padding-right:16px}
  .src .meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .tag{font-family:var(--mono);font-size:9.5px;padding:2px 6px;border-radius:4px;background:#1f2738;color:var(--c-muted);border:1px solid var(--c-border)}
  .tag.s{background:rgba(52,211,153,.14);color:var(--pass-d);border-color:transparent}
  .tag.cat{background:rgba(124,108,255,.16);color:#b3a7ff;border-color:transparent}
  .tag.fail{background:rgba(248,113,113,.15);color:var(--fail-d);border-color:transparent}
  .tag.warn{background:rgba(251,191,36,.15);color:var(--warn-d);border-color:transparent}
  .src .del{position:absolute;top:9px;right:9px;border:none;background:none;color:#566179;font-size:14px;line-height:1;padding:2px;opacity:0;transition:.1s}
  .src:hover .del{opacity:1}
  .src .del:hover{color:var(--fail-d)}

  /* ---------- tabs (on light canvas) ---------- */
  .tabs{display:flex;gap:0;flex:0 0 auto;border-bottom:1px solid var(--line);background:var(--panel);padding:0 12px}
  .tab{border:none;background:none;padding:14px 15px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);border-bottom-color:var(--ai)}
  .tab .count{font-family:var(--mono);font-size:10px;background:var(--chip);padding:1px 6px;border-radius:9px;margin-left:6px;color:var(--muted)}
  .tab.active .count{background:var(--ai-soft);color:var(--ai)}

  /* ---------- canvas content (light) ---------- */
  .empty{display:grid;place-items:center;height:100%;text-align:center;color:var(--muted);padding:30px}
  .empty .ill{width:48px;height:48px;color:#b6c0d2;margin-bottom:12px}
  .empty h3{margin:4px 0 6px;color:var(--ink);font-weight:700;font-size:17px}
  .empty p{max-width:350px;font-size:13px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh)}
  .card h4{margin:0 0 13px;font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .doc-id{font-family:var(--mono);font-size:19px;font-weight:600;letter-spacing:-.2px;color:var(--ink)}
  .doc-row{display:flex;flex-wrap:wrap;gap:18px 28px;margin-top:13px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field .lbl{font-size:10.5px;color:var(--muted);letter-spacing:.3px;display:flex;align-items:center;gap:5px}
  .field .val{font-size:14px;font-weight:550;color:var(--ink-2)}
  .bt{font-family:var(--mono);font-size:9.5px;color:#8a93a4;background:var(--chip);padding:1px 5px;border-radius:4px;border:1px solid var(--line-soft)}
  .parties{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .party{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;background:#fbfcfe}
  .party .role{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .party .pn{font-size:14px;font-weight:600;margin-top:4px;color:var(--ink)}
  .party .trn{font-family:var(--mono);font-size:12px;margin-top:8px;color:var(--ink-2)}
  .party .trn.missing{color:var(--fail)}
  table.grid{width:100%;border-collapse:collapse;font-size:12.5px;color:var(--ink-2)}
  table.grid th{text-align:left;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600;padding:7px 8px;border-bottom:1px solid var(--line)}
  table.grid td{padding:8px}
  table.grid tbody tr{border-bottom:1px solid var(--line-soft)}
  table.grid tbody tr:last-child{border-bottom:none}
  table.grid td.num,table.grid th.num{text-align:right;font-family:var(--mono)}
  .catcode{font-family:var(--mono);font-weight:600}
  .catcode.S{color:var(--ai)} .catcode.Z{color:var(--pass)} .catcode.E{color:var(--warn)} .catcode.AE{color:#7c3aed} .catcode.O{color:var(--muted)}
  .totals{display:flex;flex-wrap:wrap;gap:10px}
  .tot{flex:1 1 120px;border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;background:#fbfcfe}
  .tot .k{font-size:10.5px;color:var(--muted);display:flex;gap:5px;align-items:center}
  .tot .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:5px;color:var(--ink)}
  .tot.payable{background:#0f172a;color:#fff;border-color:#0f172a}
  .tot.payable .k{color:#9fb0c9} .tot.payable .v{color:#fff}
  .terms{display:flex;flex-wrap:wrap;gap:6px}
  .term{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:7px;padding:4px 9px 4px 4px;font-size:12px;background:#fbfcfe;color:var(--ink-2)}
  .term .tc{font-family:var(--mono);font-size:9.5px;color:#fff;background:#94a3b8;padding:2px 5px;border-radius:4px}
  /* details — unified clean layout */
  .dx-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .dx-id{font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:-.2px;color:var(--ink)}
  .dx-id .sub{display:block;font-family:var(--sans);font-size:10.5px;color:var(--muted);font-weight:500;margin-top:4px;letter-spacing:.3px}
  .dx-type{font-size:12px;font-weight:600;color:var(--ai);background:var(--ai-soft);border:1px solid var(--ai-line);padding:5px 11px;border-radius:8px;white-space:nowrap}
  .kvgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0 24px}
  .kvgrid .kv{display:flex;flex-direction:column;gap:4px;padding:11px 0;border-top:1px solid var(--line-soft)}
  .kv .kk{font-size:10.5px;color:var(--muted);letter-spacing:.3px;display:flex;align-items:center;gap:6px}
  .kv .kvv{font-size:14px;font-weight:550;color:var(--ink-2)}
  .kv .kvv.mono{font-family:var(--mono);font-size:13px}
  .prow{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-top:1px solid var(--line-soft);font-size:13px}
  .prow:first-of-type{border-top:none;padding-top:2px}
  .prow .pk{color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px}
  .prow .pv{font-weight:550;color:var(--ink-2);text-align:right;word-break:break-word}
  .prow .pv.mono{font-family:var(--mono);font-size:12.5px} .prow .pv.miss{color:var(--fail)}
  .subcap{font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);font-weight:700;margin:18px 0 9px}
  .bt-tbl td:first-child{width:1%;white-space:nowrap;color:var(--ai);font-weight:600}

  /* ---------- validation ---------- */
  .verdict{display:flex;align-items:center;gap:14px;padding:15px 17px;border-radius:var(--r);border:1px solid var(--line);margin-bottom:14px;background:var(--panel);box-shadow:var(--sh)}
  .verdict .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
  .verdict.pass .dot{background:var(--pass)} .verdict.warn .dot{background:var(--warn)} .verdict.fail .dot{background:var(--fail)}
  .verdict .vt{font-weight:700;font-size:15px;color:var(--ink)}
  .verdict.pass .vt{color:var(--pass)} .verdict.warn .vt{color:var(--warn)} .verdict.fail .vt{color:var(--fail)}
  .verdict .vs{font-size:12.5px;color:var(--muted);margin-top:1px}
  .counts{margin-left:auto;display:flex;gap:7px;font-family:var(--mono);font-size:11.5px}
  .counts span{padding:4px 9px;border-radius:6px}
  .counts .f{background:var(--fail-soft);color:var(--fail)} .counts .w{background:var(--warn-soft);color:var(--warn)} .counts .o{background:var(--pass-soft);color:var(--pass)}
  .finding{border:1px solid var(--line);border-left-width:3px;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:9px;background:var(--panel)}
  .finding.fatal{border-left-color:var(--fail)} .finding.warning{border-left-color:var(--warn)} .finding.info{border-left-color:var(--ai)}
  .finding .fh{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .sev{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;font-weight:600}
  .sev.fatal{background:var(--fail-soft);color:var(--fail)} .sev.warning{background:var(--warn-soft);color:var(--warn)} .sev.info{background:var(--ai-soft);color:var(--ai)}
  .rid{font-family:var(--mono);font-size:11.5px;color:var(--ai);font-weight:600}
  .finding .msg{font-size:13px;font-weight:550;margin-top:8px;color:var(--ink)}
  .finding .ex{font-size:12.5px;color:var(--muted);margin-top:5px}
  .finding .fix{font-size:12.5px;margin-top:7px;padding:8px 10px;background:var(--ai-soft);border-radius:6px;color:#4b3fb0}
  .finding .fix b{font-weight:650}
  .legend{font-size:11.5px;color:var(--muted);padding:11px 13px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fbfcfe;margin-top:6px}
  .legend b{color:var(--ink)}

  /* ---------- test lab ---------- */
  .lab-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .lab-head .li{font-size:12.5px;color:var(--muted);max-width:60%}
  .lab-sum{display:none;align-items:center;gap:12px;padding:12px 15px;border-radius:var(--r);margin-bottom:14px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--sh)}
  .lab-sum.show{display:flex}
  .lab-sum .ring{font-family:var(--mono);font-weight:700;font-size:15px}
  .lab-sum.ok .ring{color:var(--pass)} .lab-sum.bad .ring{color:var(--warn)}
  .lab-sum .lt{font-size:13px;font-weight:600;color:var(--ink)}
  .lab-sum .ls{font-size:12px;color:var(--muted)}
  .cat-h{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);font-weight:700;margin:16px 0 8px}
  .cat-h:first-child{margin-top:0}
  .scn{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;margin-bottom:9px;background:var(--panel)}
  .scn .sh{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .kind{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:9px;font-weight:600}
  .kind.negative{background:var(--fail-soft);color:var(--fail)} .kind.positive{background:var(--pass-soft);color:var(--pass)}
  .scn .st{font-size:13.5px;font-weight:600;color:var(--ink)}
  .scn .se{font-size:12.5px;color:var(--muted);margin-top:6px}
  .scn .expect{font-size:12px;margin-top:8px;color:var(--ink-2)}
  .scn-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:var(--panel);border-radius:7px;font-size:12px;padding:6px 12px;font-weight:600;color:var(--ink);transition:.12s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:#cbd5e3;background:#f8fafc}
  .btn.primary{background:var(--ink);border-color:var(--ink);color:#fff}
  .btn.primary:hover{background:#1e293b}
  .btn.ai{background:var(--ai-grad);border:none;color:#fff;box-shadow:0 4px 14px rgba(124,108,255,.32)}
  .btn.ai:hover{filter:brightness(1.06)}
  .btn svg{width:14px;height:14px}
  .runres{margin-top:10px;font-size:12px;padding:9px 11px;border-radius:6px;display:none}
  .runres.ok{display:block;background:var(--pass-soft);color:var(--pass)}
  .runres.miss{display:block;background:var(--warn-soft);color:var(--warn)}
  /* ---- pictorial: validation ---- */
  .v-hero{display:flex;align-items:center;gap:16px;padding:18px;border-radius:var(--r);border:1px solid var(--line);background:var(--panel);box-shadow:var(--sh);margin-bottom:14px}
  .v-hero .ring{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}
  .v-hero .ring svg{width:28px;height:28px}
  .v-hero.pass .ring{background:var(--pass-soft);color:var(--pass)} .v-hero.warn .ring{background:var(--warn-soft);color:var(--warn)} .v-hero.fail .ring{background:var(--fail-soft);color:var(--fail)}
  .v-hero .vt{font-weight:700;font-size:16px;color:var(--ink)}
  .v-hero.pass .vt{color:var(--pass)} .v-hero.warn .vt{color:var(--warn)} .v-hero.fail .vt{color:var(--fail)}
  .v-hero .vs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .meter{display:flex;height:9px;border-radius:6px;overflow:hidden;background:var(--line-soft);width:100%;max-width:340px;margin-top:11px}
  .meter span{display:block;height:100%}
  .meter .mf{background:var(--fail)} .meter .mw{background:var(--warn)} .meter .mo{background:var(--pass)}
  .mlegend{display:flex;gap:16px;margin-top:9px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
  .mlegend i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
  .sev-ic{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}
  .sev-ic svg{width:18px;height:18px}
  .sev-ic.fatal{background:var(--fail-soft);color:var(--fail)} .sev-ic.warning{background:var(--warn-soft);color:var(--warn)} .sev-ic.info{background:var(--ai-soft);color:var(--ai)} .sev-ic.pass{background:var(--pass-soft);color:var(--pass)}
  .finding{display:flex;gap:12px;align-items:flex-start} .finding .fbody{flex:1;min-width:0}
  /* ---- pictorial: test lab ---- */
  .lab-summary{display:flex;align-items:center;gap:18px;padding:16px 18px;border-radius:var(--r);border:1px solid var(--line);background:var(--panel);box-shadow:var(--sh);margin-bottom:16px}
  .donut{position:relative;width:74px;height:74px;flex:0 0 auto}
  .donut .dlabel{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:15px;color:var(--ink)}
  .lab-summary .lt{font-weight:700;font-size:15px;color:var(--ink)}
  .lab-summary .ls{font-size:12.5px;color:var(--muted);margin-top:3px;max-width:440px}
  .lab-summary .seg{display:flex;gap:16px;margin-top:9px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;align-items:center}
  .lab-summary .seg span{display:inline-flex;align-items:center;gap:5px} .lab-summary .seg svg{width:13px;height:13px} .lab-summary .seg b{font-family:var(--mono);color:var(--ink-2)}
  .cat-h{display:flex;align-items:center;gap:8px}
  .cat-h .ci{color:var(--ai);display:inline-flex} .cat-h .ci svg{width:15px;height:15px}
  .scn .status{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;border:1px solid var(--line);color:var(--faint);background:#fbfcfe}
  .scn .status svg{width:15px;height:15px}
  .scn .status.ok{background:var(--pass-soft);border-color:transparent;color:var(--pass)}
  .scn .status.miss{background:var(--warn-soft);border-color:transparent;color:var(--warn)}

const KB={

function deep(p,path){let c=p;for(const x of path){c=child(c,x);if(!c)return null;}return c;}
function txt(n){return n?(n.textContent||"").trim():"";}
function findFirst(root,name){const s=[root];while(s.length){const n=s.shift();if(n!==root&&ln(n)===name)return n;for(const c of(n.children||[]))s.push(c);}return null;}
function findAll(root,name){const o=[];const s=[root];while(s.length){const n=s.pop();if(n!==root&&ln(n)===name)o.push(n);for(const c of(n.children||[]))s.push(c);}return o.reverse();}

/* ---- parse ---- */
function parsePintAe(xml){
  xml=(xml||"").replace(/^\uFEFF/,"").replace(/^\s+/,"");
  const res={ok:false,error:null,raw:xml};let doc;
  try{doc=new DOMParser().parseFromString(xml,"application/xml");}catch(e){res.error="Could not parse the file as XML.";return res;}
  if(doc.getElementsByTagName("parsererror").length){res.error="The document is not well-formed XML.";return res;}
  const root=doc.documentElement;if(!root){res.error="The document is empty.";return res;}
  const rn=ln(root);
  if(!/^(Invoice|CreditNote)$/.test(rn)){res.error="Root element is <"+rn+">. A UBL <Invoice> or <CreditNote> is expected.";return res;}
  res.ok=true;res.root=rn;
  res.customization=txt(child(root,"CustomizationID"));res.profile=txt(child(root,"ProfileID"));
  res.id=txt(child(root,"ID"));res.issueDate=txt(child(root,"IssueDate"));res.dueDate=txt(child(root,"DueDate"));
  res.typeCode=txt(child(root,"InvoiceTypeCode"))||txt(child(root,"CreditNoteTypeCode"));
  res.typeName=KB.docTypes[res.typeCode]||(rn==="CreditNote"?"Credit Note":"Invoice");
  res.currency=txt(child(root,"DocumentCurrencyCode"));
  function party(w){const wrap=child(root,w);const p=child(wrap,"Party");if(!p)return{name:"",trn:"",country:"",addr:""};
    const name=txt(deep(p,["PartyLegalEntity","RegistrationName"]))||txt(deep(p,["PartyName","Name"]));
    let trn="";for(const pts of children(p,"PartyTaxScheme")){const id=txt(child(pts,"CompanyID"));if(id){trn=id;break;}}
    if(!trn)trn=txt(deep(p,["PartyLegalEntity","CompanyID"]));
    const pa=deep(p,["PostalAddress"]);
    const addr=pa?[txt(child(pa,"StreetName")),txt(child(pa,"CityName")),txt(deep(pa,["Country","IdentificationCode"]))].filter(Boolean).join(", "):"";
    return{name,trn,country:txt(deep(p,["PostalAddress","Country","IdentificationCode"])),addr};}
  res.seller=party("AccountingSupplierParty");res.buyer=party("AccountingCustomerParty");
  res.taxCategories=[];const tt=child(root,"TaxTotal");res.taxTotal=num(txt(child(tt,"TaxAmount")));
  for(const st of findAll(root,"TaxSubtotal")){const cat=child(st,"TaxCategory");
    res.taxCategories.push({id:txt(child(cat,"ID"))||"?",percent:txt(child(cat,"Percent")),taxable:num(txt(child(st,"TaxableAmount"))),tax:num(txt(child(st,"TaxAmount")))});}
  res.allowances=[];for(const ac of children(root,"AllowanceCharge")){
    res.allowances.push({charge:txt(child(ac,"ChargeIndicator"))==="true",reasons:children(ac,"AllowanceChargeReason").map(txt),amount:num(txt(child(ac,"Amount")))});}
  const lmt=child(root,"LegalMonetaryTotal");
  res.totals={lineExt:num(txt(child(lmt,"LineExtensionAmount"))),taxExcl:num(txt(child(lmt,"TaxExclusiveAmount"))),taxIncl:num(txt(child(lmt,"TaxInclusiveAmount"))),payable:num(txt(child(lmt,"PayableAmount"))),allowance:num(txt(child(lmt,"AllowanceTotalAmount"))),charge:num(txt(child(lmt,"ChargeTotalAmount")))};
  res.lines=[];const lname=rn==="CreditNote"?"CreditNoteLine":"InvoiceLine";
  for(const l of children(root,lname)){const item=child(l,"Item");const qn=child(l,"InvoicedQuantity")||child(l,"CreditedQuantity");
    res.lines.push({id:txt(child(l,"ID")),name:txt(child(item,"Name"))||txt(child(item,"Description")),desc:txt(child(item,"Description")),
      qty:txt(qn),unit:qn?(qn.getAttribute("unitCode")||""):"",amount:num(txt(child(l,"LineExtensionAmount"))),price:num(txt(deep(l,["Price","PriceAmount"]))),
      vatCat:txt(deep(item,["ClassifiedTaxCategory","ID"])),vatPct:txt(deep(item,["ClassifiedTaxCategory","Percent"]))});}
  res.terms=[["BT-1",res.id],["BT-2",res.issueDate],["BT-3",res.typeCode],["BT-5",res.currency],["BT-27",res.seller.name],["BT-31",res.seller.trn],["BT-44",res.buyer.name],["BT-48",res.buyer.trn],["BT-106",fmt(res.totals.lineExt)],["BT-110",fmt(res.taxTotal)],["BT-112",fmt(res.totals.taxIncl)],["BT-115",fmt(res.totals.payable)]].filter(t=>t[1]!==""&&t[1]!=null&&t[1]!=="—");
  return res;
}
function num(s){if(s===""||s==null)return null;const n=parseFloat(s);return isNaN(n)?null:n;}
function fmt(n){if(n==null)return"—";return n.toLocaleString("en-AE",{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ---- validation ---- */
function validate(a){
  const f=[];const add=(id,sev,term,msg,ex,fix)=>f.push({id,sev,term,msg,ex,fix});
  const hasStd=a.taxCategories.some(c=>c.id==="S");
  if(!a.id)add("AE-ID-01","fatal","BT-1","Invoice number is missing.","Every invoice needs a unique identifier so it can be referenced, paid, and audited.","Populate <code>cbc:ID</code> at the document root.");
  if(!a.issueDate)add("AE-DATE-01","fatal","BT-2","Issue date is missing.","The issue date anchors the tax point and reporting period.","Add <code>cbc:IssueDate</code> (YYYY-MM-DD).");
  else if(isFuture(a.issueDate))add("AE-DATE-02","warning","BT-2","Issue date is in the future.","Future-dated invoices are usually a data-entry error and may be rejected on reporting.","Confirm the actual supply date.");
  if(!a.typeCode)add("AE-TYPE-01","fatal","BT-3","Invoice type code is missing.","The type code identifies whether this is a tax invoice, credit note, self-billed document, and so on.","Add <code>cbc:InvoiceTypeCode</code> (for example 388).");
  if(!a.currency)add("AE-CUR-01","fatal","BT-5","Document currency is missing.","Amounts cannot be interpreted without a currency.","Add <code>cbc:DocumentCurrencyCode</code> (for example AED).");
  else if(!/^[A-Z]{3}$/.test(a.currency))add("AE-CUR-02","warning","BT-5","Currency code is not a valid ISO code.","Currency must be a three-letter ISO 4217 code.","Use a valid code such as AED, USD, or EUR.");
  if(hasStd&&!a.seller.trn)add("AE-TRN-S-01","fatal","BT-31","Seller TRN is missing on a standard-rated invoice.","A VAT-registered seller charging 5% must declare its 15-digit TRN.","Add the seller TRN under <code>PartyTaxScheme/CompanyID</code>.");
  if(!a.buyer.trn)add("AE-TRN-B-01","warning","BT-48","Buyer TRN is missing.","For B2B supplies the buyer TRN is normally required; without it the supply may be treated as B2C.","Capture the buyer TRN during onboarding or order entry.");
  a.taxCategories.forEach(c=>{
    if(c.id==="S"&&(c.percent===""||c.percent==null))add("AE-VAT-RATE-01","fatal","BT-119","Standard-rated subtotal has no VAT rate.","A category S line must carry a rate of 5%.","Set <code>cac:TaxCategory/cbc:Percent</code> to 5 on the standard-rated subtotal.");
    if(c.id==="AE"&&c.tax&&c.tax>0)add("AE-RC-01","warning","BT-118","Reverse-charge (AE) subtotal carries a VAT amount.","Under reverse charge the seller charges no VAT; the buyer self-accounts.","Set the AE subtotal VAT amount to 0 and include an exemption reason.");
  });
  if(a.taxTotal!=null&&a.taxCategories.length===0)add("AE-VAT-SUB-01","fatal","BT-110","A tax total is present but there are no tax subtotals.","Each VAT total must be broken down by category.","Add at least one <code>cac:TaxSubtotal</code> describing the category and amount.");
  a.allowances.forEach(al=>{if(al.reasons.length>1)add("AE-ALLOW-DUP-01","fatal","BT-097","An allowance or charge declares its reason more than once.","The standard allows the reason to appear at most once (mirrors rule ibr-sr-30).","Keep a single <code>AllowanceChargeReason</code> per allowance or charge.");});
  const t=a.totals;
  if(t.taxExcl!=null&&a.taxTotal!=null&&t.taxIncl!=null&&approx(t.taxIncl,t.taxExcl+a.taxTotal)===false)
    add("AE-MATH-01","fatal","BT-112","Tax-inclusive total does not equal tax-exclusive plus VAT.","Tax inclusive ("+fmt(t.taxIncl)+") should equal tax exclusive ("+fmt(t.taxExcl)+") plus VAT ("+fmt(a.taxTotal)+") = "+fmt((t.taxExcl||0)+(a.taxTotal||0))+".","Recompute totals in the source system; the rounding tolerance is 0.01.");
  if(t.lineExt!=null&&a.lines.length){const sum=a.lines.reduce((s,l)=>s+(l.amount||0),0);
    if(approx(t.lineExt,sum)===false)add("AE-MATH-02","warning","BT-106","Sum of line amounts does not equal the declared line-extension total.","Line total declared "+fmt(t.lineExt)+"; lines add up to "+fmt(sum)+".","Reconcile line amounts with the header total.");}
  if(a.root==="Invoice"&&a.lines.some(l=>l.amount!=null&&l.amount<0))add("AE-NEG-01","warning","BT-126","Invoice contains negative line amounts.","Negative amounts normally belong on a credit note, not an invoice.","Issue a credit note (type 381) instead.");
  if(!f.length)add("AE-OK-00","info","—","No issues detected by the built-in checks.","This invoice passes InvoiceFlow's heuristic checks. The certified schematron may apply deeper rules.","Validate against the accredited schematron before go-live.");
  return f;
}
function isFuture(d){const t=Date.parse(d);return!isNaN(t)&&t>Date.now()+864e5;}
function approx(a,b){if(a==null||b==null)return null;return Math.abs(a-b)<=0.011;}

/* ---- test-scenario generation (expanded, categorised) ---- */
function generateScenarios(a){
  const raw=a.raw;const S=[];
  const mk=(category,title,kind,rule,severity,explain,mutate)=>S.push({category,title,kind,rule,severity,explain,mutate});
  // Identity
  mk("Identity","Remove the invoice number","negative","AE-ID-01","fatal","Deletes the root identifier — the most basic fatal failure.",()=>mut(raw,d=>{const id=child(d.documentElement,"ID");if(id)id.remove();}));
  mk("Identity","Remove the invoice type code","negative","AE-TYPE-01","fatal","Drops the document type code so the FTA can't classify it.",()=>mut(raw,d=>{const e=child(d.documentElement,"InvoiceTypeCode")||child(d.documentElement,"CreditNoteTypeCode");if(e)e.remove();}));
  // Temporal
  mk("Temporal","Remove the issue date","negative","AE-DATE-01","fatal","Removes the date that anchors the tax point.",()=>mut(raw,d=>{const e=child(d.documentElement,"IssueDate");if(e)e.remove();}));
  mk("Temporal","Future-date the invoice","negative","AE-DATE-02","warning","Sets the issue date 30 days ahead to test temporal sanity.",()=>mut(raw,d=>{let e=child(d.documentElement,"IssueDate");const fut=new Date(Date.now()+30*864e5).toISOString().slice(0,10);if(!e){e=el(d,"cbc:IssueDate",fut);d.documentElement.appendChild(e);}else e.textContent=fut;}));
  // Parties
  mk("Parties","Remove the buyer TRN","negative","AE-TRN-B-01","warning","Tests detection of an incomplete B2B customer party.",()=>mut(raw,d=>{const p=findFirst(d.documentElement,"AccountingCustomerParty");findAll(p||d.documentElement,"PartyTaxScheme").forEach(n=>n.remove());}));
  mk("Parties","Remove the seller TRN","negative","AE-TRN-S-01","fatal","A standard-rated seller without a TRN is a fatal compliance gap.",()=>mut(raw,d=>{const p=findFirst(d.documentElement,"AccountingSupplierParty");findAll(p||d.documentElement,"PartyTaxScheme").forEach(n=>n.remove());}));
  // Tax
  mk("Tax","Blank the standard VAT rate","negative","AE-VAT-RATE-01","fatal","Strips the 5% rate from a standard-rated subtotal.",()=>mut(raw,d=>{findAll(d.documentElement,"TaxCategory").forEach(c=>{if(txt(child(c,"ID"))==="S"){const p=child(c,"Percent");if(p)p.remove();}});}));
  mk("Tax","Reverse charge with a VAT amount","negative","AE-RC-01","warning","Relabels a charged subtotal as reverse-charge (AE) while keeping VAT.",()=>mut(raw,d=>{const c=findFirst(d.documentElement,"TaxCategory");if(c){const id=child(c,"ID");if(id)id.textContent="AE";const st=c.parentNode;const ta=st&&child(st,"TaxAmount");if(ta&&!(num(ta.textContent)>0))ta.textContent="75.00";}}));
  mk("Tax","Drop the VAT breakdown","negative","AE-VAT-SUB-01","fatal","Keeps a VAT total but removes every subtotal that explains it.",()=>mut(raw,d=>{findAll(d.documentElement,"TaxSubtotal").forEach(n=>n.remove());}));
  // Currency
  mk("Currency","Remove the currency","negative","AE-CUR-01","fatal","Leaves amounts with no currency to interpret them.",()=>mut(raw,d=>{const e=child(d.documentElement,"DocumentCurrencyCode");if(e)e.remove();}));
  mk("Currency","Use an invalid currency code","negative","AE-CUR-02","warning","Replaces the currency with a non-ISO value.",()=>mut(raw,d=>{const e=child(d.documentElement,"DocumentCurrencyCode");if(e)e.textContent="ZZ";}));
  // Totals
  mk("Totals","Break the tax-inclusive total","negative","AE-MATH-01","fatal","Corrupts the gross total so it no longer ties to net + VAT.",()=>mut(raw,d=>{const l=child(d.documentElement,"LegalMonetaryTotal");const ti=child(l,"TaxInclusiveAmount");if(ti)ti.textContent=(num(ti.textContent)||0)+99.99;}));
  mk("Totals","Distort a line amount","negative","AE-MATH-02","warning","Changes one line so the lines no longer sum to the header.",()=>mut(raw,d=>{const ln0=findFirst(d.documentElement,"InvoiceLine")||findFirst(d.documentElement,"CreditNoteLine");const lea=ln0?child(ln0,"LineExtensionAmount"):null;if(lea)lea.textContent=(num(lea.textContent)||0)+123.45;}));
  // Structure
  mk("Structure","Duplicate an allowance reason","negative","AE-ALLOW-DUP-01","fatal","Adds a second reason to an allowance — the reason-appears-once rule (ibr-sr-30).",()=>mut(raw,d=>{let ac=findFirst(d.documentElement,"AllowanceCharge");if(!ac){ac=el(d,"cac:AllowanceCharge");ac.appendChild(el(d,"cbc:ChargeIndicator","false"));ac.appendChild(el(d,"cbc:AllowanceChargeReason","Promotion"));ac.appendChild(el(d,"cbc:Amount","0"));const l=child(d.documentElement,"LegalMonetaryTotal");d.documentElement.insertBefore(ac,l||null);}const r=child(ac,"AllowanceChargeReason")||el(d,"cbc:AllowanceChargeReason","Promotion");ac.appendChild(r.cloneNode(true));}));
  mk("Structure","Make a line amount negative","negative","AE-NEG-01","warning","Puts a credit-note style negative on a tax invoice.",()=>mut(raw,d=>{const ln0=findFirst(d.documentElement,"InvoiceLine");const lea=ln0?child(ln0,"LineExtensionAmount"):null;if(lea)lea.textContent="-"+Math.abs(num(lea.textContent)||100);}));
  // Baseline
  mk("Baseline","Unmodified copy (control)","positive","AE-OK-00","info","An unchanged copy — should pass every check.",()=>raw);
  return S;
}
function el(d,name,text){const e=d.createElement(name);if(text!=null)e.textContent=text;return e;}
function mut(raw,fn){const d=new DOMParser().parseFromString(raw,"application/xml");try{fn(d);}catch(e){}return new XMLSerializer().serializeToString(d);}

/* ---- rendering ---- */
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function active(){return state.sources.find(s=>s.id===state.activeId)||null;}
function docIcon(){return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8893a8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`;}

function renderSources(){
  const list=$("srcList");list.innerHTML="";
  state.sources.forEach(s=>{const a=s.analysis;const fatal=(s.findings||[]).filter(x=>x.sev==="fatal").length;const warn=(s.findings||[]).filter(x=>x.sev==="warning").length;
    const cats=a.ok?[...new Set(a.taxCategories.map(c=>c.id))].filter(Boolean):[];
    const div=document.createElement("div");div.className="src"+(s.id===state.activeId?" active":"");div.onclick=()=>{state.activeId=s.id;render();};
    let badges="";if(a.ok){badges+=`<span class="tag cat">${esc(a.typeName||a.root)}</span>`;cats.forEach(c=>badges+=`<span class="tag s">${esc(c)}</span>`);
      if(fatal)badges+=`<span class="tag fail">${fatal} fatal</span>`;else if(warn)badges+=`<span class="tag warn">${warn} warning</span>`;else badges+=`<span class="tag s">valid</span>`;}
    else badges=`<span class="tag fail">unparsable</span>`;
    div.innerHTML=`<div class="nm">${docIcon()} ${esc(s.name)}</div><div class="meta">${badges}</div><button class="del" title="Remove">&times;</button>`;
    div.querySelector(".del").onclick=e=>{e.stopPropagation();removeSource(s.id);};list.appendChild(div);});
  const n=state.sources.length;$("globalStat").innerHTML=n?`<b>${n}</b> invoice${n>1?"s":""} · <b>${totalFindings()}</b> findings`:"No invoices loaded";
}
function totalFindings(){return state.sources.reduce((s,x)=>s+((x.findings||[]).filter(f=>f.sev!=="info").length),0);}

function render(){
  renderSources();const a=active();
  $("cntVal").textContent=a&&a.analysis.ok?(a.findings||[]).filter(f=>f.sev!=="info").length:0;
  $("cntLab").textContent=a&&a.analysis.ok?(a.scenarios||[]).length:0;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
  const body=$("canvasBody");
  if(state.tab==="compare"){body.innerHTML=renderCompare();wireCompare();return;}
  if(!a){body.innerHTML="";body.appendChild(emptyNode());return;}
  if(!a.analysis.ok){body.innerHTML=`<div class="card"><h4>Cannot read file</h4><div class="finding fatal"><div class="msg">${esc(a.analysis.error)}</div><div class="ex">InvoiceFlow expects a UBL Invoice or CreditNote in PINT-AE form.</div></div></div>`;return;}
  if(state.tab==="view"){body.innerHTML=renderInvoiceView(a.analysis);const pb=$("printBtn");if(pb)pb.onclick=()=>window.print();}
  else if(state.tab==="details"){body.innerHTML=renderDetails(a.analysis);const j=$("expJson");if(j)j.onclick=()=>exportDecodedJSON(a.analysis);const c=$("expCsv");if(c)c.onclick=()=>exportLinesCSV(a.analysis);}
  else if(state.tab==="validation"){body.innerHTML=renderValidation(a.analysis,a.findings);const j=$("vJson");if(j)j.onclick=()=>exportFindingsJSON(a);const c=$("vCsv");if(c)c.onclick=()=>exportFindingsCSV(a);const r=$("vReport");if(r)r.onclick=()=>exportReportHTML(a);}
  else{body.innerHTML=renderLab(a);wireLab(a);}
}
function emptyNode(){const d=document.createElement("div");d.className="empty";
  d.innerHTML=`<svg class="ill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
  <h3>No invoice loaded</h3><p>Add a PINT-AE XML file, or load a sample, to view it as a formatted invoice, inspect its data, validate it, and generate test scenarios. The agent on the right can do all of this for you.</p>`;return d;}

function renderInvoiceView(a){
  const cur=a.currency&&/^[A-Z]{3}$/.test(a.currency)?a.currency:"";
  const lines=a.lines.map((l,i)=>`<tr><td>${i+1}</td><td>${esc(l.name||"—")}${l.desc&&l.desc!==l.name?`<div class="desc-sub">${esc(l.desc)}</div>`:""}</td><td class="num">${esc(l.qty||"")}${l.unit?" "+esc(l.unit):""}</td><td class="num">${l.price!=null?fmt(l.price):"—"}</td><td>${l.vatCat?`<span class="catcode ${esc(l.vatCat)}">${esc(l.vatCat)}</span>${l.vatPct?" "+esc(l.vatPct)+"%":""}`:"—"}</td><td class="num">${fmt(l.amount)}</td></tr>`).join("");
  const vatRows=a.taxCategories.map(c=>`<div class="trow sub"><span class="tk">VAT — ${esc(c.id)}${c.percent!==""?" @ "+esc(c.percent)+"%":""}</span><span class="tv">${fmt(c.tax)}</span></div>`).join("");
  const notes=[];if(a.allowances.length)a.allowances.forEach(al=>notes.push((al.charge?"Charge":"Allowance")+": "+(al.reasons.join(", ")||"—")+" ("+fmt(al.amount)+")"));if(a.dueDate)notes.push("Payment due by "+a.dueDate+".");
  return `<div class="view-bar"><span class="vh">Formatted invoice</span><button class="btn" id="printBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print / Save as PDF</button></div>
  <div class="inv-doc" id="invoiceDoc">
    <div class="inv-head"><div class="inv-seller"><div class="sname">${esc(a.seller.name||"Seller")}</div>${a.seller.addr?`<div class="sline">${esc(a.seller.addr)}</div>`:""}${a.seller.trn?`<div class="strn">TRN ${esc(a.seller.trn)}</div>`:""}</div>
      <div class="inv-titleblock"><div class="inv-title">${esc((a.typeName||"Invoice").toUpperCase())}</div>
        <table class="inv-metatbl"><tr><td class="k">Invoice No.</td><td class="v">${esc(a.id||"—")}</td></tr><tr><td class="k">Issue date</td><td class="v">${esc(a.issueDate||"—")}</td></tr>${a.dueDate?`<tr><td class="k">Due date</td><td class="v">${esc(a.dueDate)}</td></tr>`:""}<tr><td class="k">Currency</td><td class="v">${esc(a.currency||"—")}</td></tr></table></div></div>
    <div class="inv-rule"></div>
    <div class="inv-billto"><div><div class="bt-lbl">Bill to</div><div class="bt-name">${esc(a.buyer.name||"Buyer")}</div>${a.buyer.addr?`<div class="bt-line">${esc(a.buyer.addr)}</div>`:""}${a.buyer.trn?`<div class="bt-trn">TRN ${esc(a.buyer.trn)}</div>`:""}</div>${a.seller.country?`<div><div class="bt-lbl">Supply from</div><div class="bt-line">${esc(a.seller.country)}</div></div>`:""}</div>
    <table class="inv-lines"><thead><tr><th>#</th><th>Description</th><th class="num">Qty</th><th class="num">Unit price</th><th>VAT</th><th class="num">Amount</th></tr></thead><tbody>${lines||`<tr><td colspan="6" style="color:#8a93a4">No line items.</td></tr>`}</tbody></table>
    <div class="inv-summary"><div class="inv-notes">${notes.length?`<div class="nt-lbl">Notes</div>${notes.map(n=>`<div>${esc(n)}</div>`).join("")}`:""}</div>
      <div class="inv-totbox"><div class="trow"><span class="tk">Subtotal</span><span class="tv">${fmt(a.totals.lineExt)}</span></div>${a.totals.allowance!=null&&a.totals.allowance>0?`<div class="trow"><span class="tk">Discount</span><span class="tv">-${fmt(a.totals.allowance)}</span></div>`:""}<div class="trow"><span class="tk">Taxable amount</span><span class="tv">${fmt(a.totals.taxExcl)}</span></div>${vatRows}<div class="trow"><span class="tk">Total VAT</span><span class="tv">${fmt(a.taxTotal)}</span></div><div class="grand"><span class="gk">Amount due</span><span class="gv">${cur?cur+" ":""}${fmt(a.totals.payable)}</span></div></div></div>
    <div class="inv-foot"><span>${a.customization?"Profile: "+esc(a.customization):"PINT-AE e-invoice"}</span><span>Rendered by InvoiceFlow · not a tax document</span></div>
  </div>`;
}

function renderDetails(a){
  const f=v=>v&&v!=="—"?esc(v):'<span style="color:var(--fail)">—</span>';

function ic(n){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||ICONS.dot}</svg>`;}
function donut(pass,total){const r=30,c=2*Math.PI*r,frac=total?pass/total:0;const col=!total||pass===total?"var(--pass)":(pass===0?"var(--faint)":"var(--warn)");
  return `<div class="donut"><svg viewBox="0 0 74 74" width="74" height="74" style="transform:rotate(-90deg)"><circle cx="37" cy="37" r="${r}" fill="none" style="stroke:var(--line-soft)" stroke-width="8"/><circle cx="37" cy="37" r="${r}" fill="none" style="stroke:${col}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${(c*(1-frac)).toFixed(1)}"/></svg><div class="dlabel">${total?pass+"/"+total:"–"}</div></div>`;}
function setStatus(node,ok){const st=node.querySelector("[data-status]");if(!st)return;st.className="status "+(ok?"ok":"miss");st.innerHTML=ic(ok?"check":"x");}

function renderValidation(a,findings){
  const fatal=findings.filter(f=>f.sev==="fatal").length,warn=findings.filter(f=>f.sev==="warning").length;
  const ruleTotal=Object.keys(RULE_KB).length;const okCount=Math.max(0,ruleTotal-fatal-warn);
  let cls,vt,vs,hi;
  if(fatal){cls="fail";hi="x";vt="Would be rejected";vs=`${fatal} fatal issue${fatal>1?"s":""} the schematron would block.`;}
  else if(warn){cls="warn";hi="alert";vt="Valid, with warnings";vs=`Passes fatal checks; ${warn} item${warn>1?"s":""} to review.`;}
  else{cls="pass";hi="check";vt="Passes built-in checks";vs="No blocking issues detected.";}
  const tot=fatal+warn+okCount;const w=n=>tot?(n/tot*100).toFixed(1)+"%":"0%";
  const meter=`<div class="meter"><span class="mo" style="width:${w(okCount)}"></span><span class="mw" style="width:${w(warn)}"></span><span class="mf" style="width:${w(fatal)}"></span></div><div class="mlegend"><span><i style="background:var(--pass)"></i>${okCount} of ${ruleTotal} checks passed</span><span><i style="background:var(--warn)"></i>${warn} warning${warn===1?"":"s"}</span><span><i style="background:var(--fail)"></i>${fatal} fatal</span></div>`;
  const hero=`<div class="v-hero ${cls}"><div class="ring">${ic(hi)}</div><div style="flex:1;min-width:0"><div class="vt">${vt}</div><div class="vs">${vs}</div>${meter}</div></div>`;
  const items=findings.filter(f=>f.sev!=="info"||(!fatal&&!warn)).map(f=>{
    const isOk=f.id==="AE-OK-00";const sevCls=isOk?"pass":f.sev;const sevIc=isOk?"check":(f.sev==="fatal"?"x":f.sev==="warning"?"alert":"info");
    return `<div class="finding ${f.sev}"><div class="sev-ic ${sevCls}">${ic(sevIc)}</div><div class="fbody"><div class="fh"><span class="sev ${f.sev}">${esc(f.sev)}</span><span class="rid">${esc(f.id)}</span>${f.term&&f.term!=="—"?`<span class="bt">${esc(f.term)}</span>`:""}</div><div class="msg">${esc(f.msg)}</div><div class="ex">${f.ex}</div>${f.fix?`<div class="fix"><b>Fix:</b> ${f.fix}</div>`:""}</div></div>`;}).join("");
  const toolbar=`<div class="toolbar"><span class="vh">Validation result</span><div class="tb-actions"><button class="btn" id="vReport">${ic("file")} Download report</button><button class="btn" id="vJson">${ic("download")} JSON</button><button class="btn" id="vCsv">${ic("download")} CSV</button></div></div>`;
  return toolbar+hero+items+`<div class="legend"><b>Heuristic checks.</b> These mirror common PINT-AE schematron rules (prefixed <span class="mono">AE-</span>) but are not the certified validator. Confirm against the accredited schematron before go-live.</div>`;
}

function renderLab(src){
  const s=src.scenarios||[];const cats=[...new Set(s.map(x=>x.category))];const neg=s.filter(x=>x.kind==="negative").length;
  const cov=coverage(src);const multi=state.sources.filter(x=>x.analysis.ok).length>1;
  let html=`<div class="lab-head"><div class="li">Each scenario takes <b>${esc(src.name)}</b> and injects one fault, then checks that the validator catches it. Run one, run them all, or download the broken XML.</div><div class="tb-actions"><button class="btn ai" id="runAllBtn">${ic("play")} Run all checks</button>${multi?`<button class="btn" id="runBatchBtn">${ic("diff")} Run all invoices</button>`:""}</div></div>`;
  html+=`<div class="lab-summary" id="labSum">${donut(0,s.length)}<div><div class="lt">${s.length} scenarios ready</div><div class="ls">${neg} fault injections across ${cats.length} categories, plus 1 baseline control. Press “Run all checks” to grade them — each should fire its expected rule.</div></div></div>`;
  html+=`<div class="cov"><span class="covt">Rule coverage</span><div class="covbar"><span style="width:${(cov.covered/cov.total*100).toFixed(0)}%"></span></div><span class="covn">${cov.covered}/${cov.total} built-in rules${cov.missing.length?" · gaps: "+cov.missing.join(", "):" · complete"}</span></div>`;
  cats.forEach(cat=>{html+=`<div class="cat-h"><span class="ci">${ic(cat)}</span>${esc(cat)}</div>`;
    s.forEach((sc,i)=>{if(sc.category!==cat)return;
      const flowMut=sc.kind==="positive"
        ?`<span class="fnode">${ic("equals")} unchanged</span><span class="farrow">${ic("arrow")}</span><span class="fnode passnode">${ic("check")} passes</span>`
        :`<span class="fnode mut ${sc.severity}">${ic("scissors")} ${esc(sc.severity)} fault</span><span class="farrow">${ic("arrow")}</span><span class="fnode rule">${ic("flag")} ${esc(sc.rule)}</span>`;
      html+=`<div class="scn" data-i="${i}"><div class="sh"><span class="status idle" data-status>${ic("dot")}</span><span class="kind ${sc.kind}">${sc.kind}</span><span class="st">${esc(sc.title)}</span></div><div class="se">${esc(sc.explain)}</div><div class="flow"><span class="fnode valid">${ic("file")} valid</span><span class="farrow">${ic("arrow")}</span>${flowMut}</div><div class="scn-actions"><button class="btn primary" data-act="run">${ic("play")} Run check</button><button class="btn" data-act="diff">${ic("diff")} View change</button><button class="btn" data-act="dl">${ic("download")} XML</button><button class="btn" data-act="add">${ic("plus")} Add as invoice</button></div><div class="runres" data-res></div><div class="diff" data-diff></div></div>`;});});
  return html;
}
function renderCompare(){
  const oks=state.sources.filter(s=>s.analysis.ok);
  if(oks.length<2)return `<div class="empty" style="height:auto;padding:54px 30px"><svg class="ill" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M9 6h6a3 3 0 0 1 3 3v6M15 18H9a3 3 0 0 1-3-3V9"/></svg><h3>Load two invoices to compare</h3><p>Add at least two readable PINT-AE invoices, then pick A and B to see a field-by-field diff of parties, totals, tax, and validation findings. Tip: the Test Lab’s “Add as invoice” is a quick way to get a second one.</p></div>`;
  let A=active();if(!A||!A.analysis.ok)A=oks[0];
  let B=state.sources.find(s=>s.id===state.compareB&&s.analysis.ok);
  if(!B||B.id===A.id)B=oks.find(s=>s.id!==A.id);
  state.compareB=B.id;
  const xA=A.analysis,xB=B.analysis;
  const opt=sel=>oks.map(s=>`<option value="${s.id}"${s.id===sel?" selected":""}>${esc(s.name)}</option>`).join("");
  const rows=[];
  const trow=(label,va,vb,mono)=>{va=(va==null||va==="")?"—":va;vb=(vb==null||vb==="")?"—":vb;const diff=String(va)!==String(vb);rows.push(`<tr class="${diff?"diff":""}"><td class="lbl">${esc(label)}${diff?'<span class="cmp-tag">changed</span>':""}</td><td class="val">${mono?'<span class="mono">'+esc(va)+"</span>":esc(va)}</td><td class="val">${mono?'<span class="mono">'+esc(vb)+"</span>":esc(vb)}</td></tr>`);};
  const nrow=(label,na,nb)=>{const diff=(na||0)!==(nb||0);const delta=diff?` <span class="delta">${(nb-na)>=0?"+":""}${fmt(nb-na)}</span>`:"";rows.push(`<tr class="${diff?"diff":""}"><td class="lbl">${esc(label)}${diff?'<span class="cmp-tag">changed</span>':""}</td><td class="val"><span class="mono">${fmt(na)}</span></td><td class="val"><span class="mono">${fmt(nb)}</span>${delta}</td></tr>`);};
  trow("Invoice number",xA.id,xB.id,true);trow("Type",xA.typeName,xB.typeName);
  trow("Issue date",xA.issueDate,xB.issueDate,true);trow("Due date",xA.dueDate,xB.dueDate,true);
  trow("Currency",xA.currency,xB.currency,true);
  trow("Seller",xA.seller.name,xB.seller.name);trow("Seller TRN",xA.seller.trn,xB.seller.trn,true);
  trow("Buyer",xA.buyer.name,xB.buyer.name);trow("Buyer TRN",xA.buyer.trn,xB.buyer.trn,true);
  trow("Tax categories",[...new Set(xA.taxCategories.map(c=>c.id))].sort().join(", "),[...new Set(xB.taxCategories.map(c=>c.id))].sort().join(", "),true);
  trow("Line items",String(xA.lines.length),String(xB.lines.length),true);
  nrow("Sum of lines (BT-106)",xA.totals.lineExt,xB.totals.lineExt);nrow("Net (BT-109)",xA.totals.taxExcl,xB.totals.taxExcl);
  nrow("Total VAT (BT-110)",xA.taxTotal,xB.taxTotal);nrow("Payable (BT-115)",xA.totals.payable,xB.totals.payable);
  const fa=(A.findings||[]).filter(f=>f.sev!=="info"),fb=(B.findings||[]).filter(f=>f.sev!=="info");
  const sa=new Set(fa.map(f=>f.id)),sb=new Set(fb.map(f=>f.id));
  const onlyA=[...sa].filter(x=>!sb.has(x)),onlyB=[...sb].filter(x=>!sa.has(x)),both=[...sa].filter(x=>sb.has(x));
  const fatalA=fa.filter(f=>f.sev==="fatal").length,fatalB=fb.filter(f=>f.sev==="fatal").length;
  const diffs=rows.filter(r=>r.indexOf('class="diff"')>-1).length;
  const findingCard=`<div class="card"><h4>Validation comparison</h4><div class="totals"><div class="tot"><div class="k">A · fatal</div><div class="v" style="color:${fatalA?"var(--fail)":"var(--pass)"}">${fatalA}</div></div><div class="tot"><div class="k">B · fatal</div><div class="v" style="color:${fatalB?"var(--fail)":"var(--pass)"}">${fatalB}</div></div><div class="tot"><div class="k">Shared issues</div><div class="v">${both.length}</div></div></div>${onlyA.length?`<div style="margin-top:13px;font-size:12.5px"><b style="color:var(--ai)">Only in A:</b> ${onlyA.map(r=>'<span class="rid">'+esc(r)+"</span>").join(", ")}</div>`:""}${onlyB.length?`<div style="margin-top:8px;font-size:12.5px"><b style="color:#0891b2">Only in B:</b> ${onlyB.map(r=>'<span class="rid">'+esc(r)+"</span>").join(", ")}</div>`:""}${!onlyA.length&&!onlyB.length?`<div style="margin-top:13px;font-size:12.5px;color:var(--muted)">Both invoices raise the same set of issues.</div>`:""}</div>`;
  return `<div class="toolbar"><span class="vh">Compare invoices</span><span class="pill" style="background:var(--chip);border:1px solid var(--line);color:var(--muted)">${diffs} field${diffs===1?"":"s"} differ</span></div>

}
function wireCompare(){const a=$("cmpA"),b=$("cmpB");if(a)a.onchange=()=>{state.activeId=+a.value;render();persist();};if(b)b.onchange=()=>{state.compareB=+b.value;render();persist();};}
function runScenario(sc){
  const xml=sc.mutate();const a=parsePintAe(xml);
  if(!a.ok)return{ok:false,text:"The mutated file no longer parses: "+a.error};
  const fnd=validate(a);
  if(sc.kind==="positive"){const fatal=fnd.filter(f=>f.sev==="fatal").length;return{ok:!fatal,text:fatal?`Baseline unexpectedly has ${fatal} fatal issue(s).`:"Baseline passes — positive control confirmed."};}
  const hit=fnd.find(f=>f.id===sc.rule);
  if(hit)return{ok:true,text:`Rule <b>${esc(sc.rule)}</b> fired as expected — "${esc(hit.msg)}"`};
  return{ok:false,text:`Rule <b>${esc(sc.rule)}</b> did not fire. Fired: ${fnd.filter(f=>f.sev!=="info").map(f=>f.id).join(", ")||"none"}.`};
}
function wireLab(src){
  document.querySelectorAll(".scn").forEach(node=>{const sc=src.scenarios[+node.dataset.i];const res=node.querySelector("[data-res]");const dpanel=node.querySelector("[data-diff]");
    node.querySelector('[data-act="run"]').onclick=()=>{const r=runScenario(sc);res.className="runres "+(r.ok?"ok":"miss");res.innerHTML=r.text;setStatus(node,r.ok);};
    node.querySelector('[data-act="diff"]').onclick=()=>{
      if(dpanel.classList.contains("show")){dpanel.classList.remove("show");return;}
      const d=xmlDiff(src.raw,sc.mutate());
      dpanel.innerHTML=`<div class="dh">What this scenario changes</div>`+
        (d.removed.map(l=>`<div class="dl del">${esc(l.trim())}</div>`).join("")||"")+
        (d.added.map(l=>`<div class="dl add">${esc(l.trim())}</div>`).join("")||"")+
        (!d.removed.length&&!d.added.length?`<div class="dl non">No line-level change detected (the mutation alters an attribute in place).</div>`:"");
      dpanel.classList.add("show");};

function runAll(src){

function xmlDiff(orig,mut){const A=orig.split(/\n/),B=mut.split(/\n/);const sa=new Set(A.map(s=>s.trim())),sb=new Set(B.map(s=>s.trim()));
  const removed=A.filter(l=>l.trim()&&!sb.has(l.trim())).slice(0,8);const added=B.filter(l=>l.trim()&&!sa.has(l.trim())).slice(0,8);return{removed,added};}
function coverage(src){const keys=Object.keys(RULE_KB);const covered=new Set((src.scenarios||[]).map(s=>s.rule).filter(r=>keys.includes(r)));return{covered:covered.size,total:keys.length,missing:keys.filter(r=>!covered.has(r))};}

function ctx(){

    c+="OPEN INVOICE:\n"+JSON.stringify({name:a.name,id:x.id,type:x.typeName,issued:x.issueDate,due:x.dueDate,currency:x.currency,seller:x.seller,buyer:x.buyer,taxCategories:x.taxCategories,totals:x.totals,vat:x.taxTotal,lines:x.lines.length})+"\n";
    c+="VALIDATION FINDINGS:\n"+JSON.stringify((a.findings||[]).map(f=>({rule:f.id,severity:f.sev,term:f.term,issue:f.msg,fix:(f.fix||"").replace(/<[^>]+>/g,"")})))+"\n";

async function submit(text){
  if(!text||state.busy)return;
  pushUser(text);state.history.push({role:"user",content:text});
  $("chatInput").value="";autosize();state.busy=true;$("sendBtn").disabled=true;
  const botEl=pushBot();const lbl=botEl.querySelector("#workLbl");
  const steps=["Reading the invoice…","Checking validation rules…","Composing the answer…"];let si=0;
  const tick=setInterval(()=>{if(lbl){lbl.textContent=steps[si=(si+1)%steps.length];}},900);
  let replyText="";
  try{ replyText=await askBackend(); setMode(true); }
  catch(e){ replyText=localAnswer(text); setMode(false); }
  clearInterval(tick);
  const {clean,action}=extractAction(replyText);
  const actLabel=action?executeAction(action):null;
  botEl.querySelector(".bubble").innerHTML=mdToHtml(clean||"(no answer)")+(actLabel?`<div class="actpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${esc(actLabel)}</div>`:"");
  state.history.push({role:"assistant",content:clean||replyText});
  state.busy=false;$("sendBtn").disabled=false;$("chat").scrollTop=$("chat").scrollHeight;persist();
}
async function askBackend(){
  const msgs=state.history.filter(m=>m.role==="user"||m.role==="assistant").slice(-10);
  const resp=await fetch(API_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:ctx(),messages:msgs})});
  if(!resp.ok)throw new Error("api "+resp.status);
  const data=await resp.json();const out=(data.reply||"").trim();if(!out)throw new Error("empty");return out;
}
function extractAction(text){
  let raw=null;
  let m=text.match(/```(?:action|json)?\s*(\{[\s\S]*?"action"[\s\S]*?\})\s*```/);
  if(m)raw=m[1]; else { const m2=text.match(/(\{[^{}]*"action"[^{}]*\})\s*$/); if(m2)raw=m2[1]; }
  let action=null;if(raw){try{action=JSON.parse(raw);}catch(e){}}
  let clean=text.replace(/```(?:action|json)?\s*\{[\s\S]*?\}\s*```/g,"").replace(/\{[^{}]*"action"[^{}]*\}\s*$/,"").trim();
  return {clean,action};
}
function executeAction(a){
  try{
    if(a.action==="open_tab"&&["view","details","validation","lab"].includes(a.tab)){state.tab=a.tab;render();return "Opened "+a.tab.charAt(0).toUpperCase()+a.tab.slice(1);}
    const src=active();
    if(a.action==="generate_tests"&&src){state.tab="lab";render();return "Generated "+(src.scenarios||[]).length+" test scenarios";}
    if(a.action==="run_tests"&&src){state.tab="lab";render();const r=runAll(src);return "Ran all checks — "+r.pass+"/"+r.total+" as expected";}
    if(a.action==="add_test"&&src&&a.rule){const sc=(src.scenarios||[]).find(s=>s.rule===a.rule);if(sc){addSource(src.name.replace(/\.xml$/i,"")+" ["+a.rule+"].xml",sc.mutate());return "Added test invoice for "+a.rule;}}
    if(a.action==="load_sample"){addSource(a.kind==="bad"?"non-compliant-invoice.xml":"sample-tax-invoice.xml",a.kind==="bad"?SAMPLE_BAD:SAMPLE_GOOD);return "Loaded "+(a.kind==="bad"?"non-compliant":"sample")+" invoice";}
  }catch(e){}
  return null;
}

/* ---- offline fallback (still useful, can act locally) ---- */
function localAnswer(text){
  const q=text.toLowerCase();const a=active();
  const ruleId=(text.match(/AE-[A-Z]+-?\d*/i)||[])[0];
  if(ruleId&&RULE_KB[ruleId.toUpperCase()])return `**${ruleId.toUpperCase()}** — ${RULE_KB[ruleId.toUpperCase()]}`;
  for(const[k,v]of Object.entries(KB.concepts)){if(q.includes(k.replace("-"," "))||q.includes(k))return v;}
  const catHit=Object.keys(KB.taxCategories).find(c=>new RegExp("\\b"+c.toLowerCase()+"\\b|category "+c.toLowerCase()).test(q));
  if(catHit){const c=KB.taxCategories[catHit];return `**Tax category ${catHit} — ${c.name} (${c.rate}).** ${c.note}`;}
  if(a&&a.analysis.ok&&/(test|scenario)/.test(q)){if(/run/.test(q)){state.tab="lab";render();const r=runAll(a);return `Ran all ${r.total} checks — ${r.pass} behaved as expected. \`\`\`action\n{"action":"open_tab","tab":"lab"}\n\`\`\``;}state.tab="lab";render();return `Generated ${(a.scenarios||[]).length} test scenarios across ${[...new Set(a.scenarios.map(s=>s.category))].length} categories — opening the Test Lab. \`\`\`action\n{"action":"open_tab","tab":"lab"}\n\`\`\``;}
  if(a&&a.analysis.ok&&/(fail|reject|wrong|issue|problem|why)/.test(q)){const ff=(a.findings||[]).filter(f=>f.sev!=="info");return ff.length?("This invoice has "+ff.length+" issue(s): "+ff.map(f=>`**${f.id}** (${f.sev}) — ${f.msg}`).join("; ")+`. \`\`\`action\n{"action":"open_tab","tab":"validation"}\n\`\`\``):"No blocking issues by the built-in checks.";}
  if(a&&a.analysis.ok&&/(summar|explain|overview|what.*invoice)/.test(q)){const x=a.analysis;return `This is a **${x.typeName}** (${x.id||"no id"}) for **${x.currency||""} ${fmt(x.totals.payable)}**, ${x.seller.name||"seller"} to ${x.buyer.name||"buyer"}, with ${x.lines.length} line(s). ${(a.findings||[]).filter(f=>f.sev==="fatal").length?"It has fatal validation issues — open Validation to see them.":"It passes the built-in checks."}`;}
  if(!a)return "Load an invoice (left panel or a sample) and I can summarize it, validate it, generate tests, and answer concept questions. Live AI answers need the assistant service to be configured.";
  return "I can summarize this invoice, explain why it might fail, run or generate tests, and answer concept questions (tax categories, TRN, ASP, Peppol, schematron). Try a chip above. (Using built-in knowledge — live AI needs the backend configured.)";
}

function setMode(live){const m=$("agentMode");if(state.apiLive===live)return;state.apiLive=live;m.innerHTML=`<span class="md"></span>${live?"Online":"Offline"}`;m.className="mode"+(live?" live":"");}
function mdToHtml(t){
  t=esc(t);t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  const lines=t.split(/\n/);let html="";let lt=null;const close=()=>{if(lt){html+=`</${lt}>`;lt=null;}};
  for(let line of lines){
    let mh=line.match(/^\s*#{1,4}\s+(.*)$/);if(mh){close();html+=`<h5>${mh[1]}</h5>`;continue;}
    let mu=line.match(/^\s*[-*]\s+(.*)$/);let mo=line.match(/^\s*\d+\.\s+(.*)$/);
    if(mu){if(lt!=="ul"){close();html+="<ul>";lt="ul";}html+=`<li>${mu[1]}</li>`;continue;}
    if(mo){if(lt!=="ol"){close();html+="<ol>";lt="ol";}html+=`<li>${mo[1]}</li>`;continue;}
    close();if(line.trim())html+=`<p>${line}</p>`;
  }
  close();return html||"<p>…</p>";
}
